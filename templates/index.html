<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Розумний будинок | Дашборд</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        /* Стилі специфічні для дашборду (картки кімнат) */
        .room-card {
            background: white;
            border-radius: 24px;
            border: none;
            box-shadow: var(--card-shadow);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            cursor: pointer;
            overflow: hidden;
            margin-bottom: 24px;
            height: 100%;
        }
        .room-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--hover-shadow);
        }
        .card-header-custom {
            padding: 18px 20px 8px 20px;
            border-bottom: 2px solid #eef2f6;
            background: white;
        }
        .room-name {
            font-size: 1.35rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .sensor-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            padding: 16px 20px 20px 20px;
        }
        .sensor-tile {
            flex: 1;
            min-width: 100px;
            background: #f8fafd;
            border-radius: 20px;
            padding: 12px 8px;
            text-align: center;
        }
        .sensor-icon { font-size: 1.8rem; display: block; margin-bottom: 6px; }
        .sensor-label { font-size: 0.7rem; font-weight: 600; text-transform: uppercase; color: #5b6e8c; }
        .sensor-value { font-size: 1.6rem; font-weight: 800; line-height: 1.2; margin-top: 4px; }
        .sensor-unit { font-size: 0.8rem; font-weight: 500; color: #6c7a91; }
        .temp-normal { color: #1e7e34; }
        .temp-high { color: #dc3545; }
        .temp-low { color: #0d6efd; }
        .detail-item {
            background: #f8fafd;
            border-radius: 20px;
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        @media (max-width: 768px) {
            .sensor-value { font-size: 1.2rem; }
            .sensor-icon { font-size: 1.4rem; }
            .room-name { font-size: 1.1rem; }
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">🏠 Розумний будинок</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link active" href="/">📊 Дашборд</a></li>
                    <li class="nav-item"><a class="nav-link" href="/devices">🔧 Пристрої</a></li>
                    <li class="nav-item"><a class="nav-link" href="/sensors">📈 Сенсори</a></li>
                    <li class="nav-item"><a class="nav-link" href="/automation">⚙️ Автоматизація</a></li>
                    <li class="nav-item"><a class="nav-link" href="/events">📋 Події</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="d-flex flex-wrap justify-content-between align-items-center mb-3">
            <h2 class="fw-semibold"><i class="fas fa-chalkboard-user me-2"></i> Панель керування</h2>
            <div class="d-flex align-items-center gap-3">
                <div class="text-muted small"><i class="fas fa-sync-alt me-1"></i> Оновлення: <span id="lastUpdateTime">--:--:--</span></div>
                <button class="btn btn-sm btn-outline-secondary refresh-btn" onclick="fetchAllData()"><i class="fas fa-arrow-rotate-right"></i> Оновити</button>
            </div>
        </div>
        <div id="roomsGrid" class="row g-4"><div class="col-12 text-center py-5"><div class="spinner-border text-primary"></div><p class="mt-2">Завантаження...</p></div></div>
        <div class="card mt-4 border-0 shadow-sm">
            <div class="card-header bg-white border-0 pt-3 pb-0"><h5 class="fw-semibold"><i class="fas fa-history me-2"></i>Останні події</h5></div>
            <div class="card-body p-3"><div id="eventsList" class="list-group list-group-flush"><div class="text-muted text-center py-3">Завантаження...</div></div></div>
        </div>
    </div>
    <div class="footer-note"><i class="fas fa-microchip me-1"></i> Система «Розумний будинок» | Дані оновлюються автоматично</div>

    <!-- Модальне вікно для деталей -->
    <div class="modal fade" id="roomDetailModal" tabindex="-1"><div class="modal-dialog modal-dialog-centered"><div class="modal-content"><div class="modal-header"><h5 class="modal-title" id="modalRoomName">📋 Деталі кімнати</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div><div class="modal-body" id="modalRoomBody"></div><div class="modal-footer"><button class="btn btn-secondary" data-bs-dismiss="modal">Закрити</button></div></div></div></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/common.js"></script>
    <script src="/static/js/dashboard.js"></script>
</body>
</html>
