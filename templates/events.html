<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Журнал подій - Розумний будинок</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .event-row:hover {
            background-color: #f8f9fa;
        }
        .event-time {
            font-family: monospace;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">🏠 Розумний будинок</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" href="/">📊 Дашборд</a></li>
                    <li class="nav-item"><a class="nav-link" href="/devices">🔧 Пристрої</a></li>
                    <li class="nav-item"><a class="nav-link" href="/sensors">📈 Сенсори</a></li>
                    <li class="nav-item"><a class="nav-link" href="/automation">⚙️ Автоматизація</a></li>
                    <li class="nav-item"><a class="nav-link active" href="/events">📋 Події</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>📋 Журнал подій системи</h2>
            <div>
                <span class="refresh-indicator"></span>
                <span class="text-muted">Авто-оновлення кожні 10 секунд</span>
                <button class="btn btn-sm btn-outline-primary ms-3" onclick="loadEvents()">
                    🔄 Оновити
                </button>
            </div>
        </div>

        <div class="card shadow-sm">
            <div class="card-header bg-info text-white">
                <h5 class="mb-0">📝 Історія подій</h5>
            </div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover mb-0">
                        <thead class="table-light">
                            <tr>
                                <th style="width: 20%">🕐 Час</th>
                                <th style="width: 30%">🔧 Пристрій</th>
                                <th style="width: 50%">📄 Подія</th>
                            </tr>
                        </thead>
                        <tbody id="events-body">
                            <tr><td colspan="3" class="text-center py-4">Завантаження...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="text-center text-muted mt-3">
            <small>Показано останні 50 подій</small>
        </div>
    </div>

    <footer class="text-center text-muted mt-4 mb-3">
        <hr>
        <p>Курсовий проєкт "Система Розумний будинок"</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/common.js"></script>
    <script src="/static/js/events.js"></script>
</body>
</html>
